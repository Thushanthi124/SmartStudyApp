workflows:
  android-build:
    name: Android Build Pipeline
    max_build_duration: 30

    environment:
      vars:
        PACKAGE_NAME: "com.example.smartstudyapp"

    scripts:
      - name: Install dependencies
        script: |
          chmod +x gradlew
          ./gradlew clean

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
